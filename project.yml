name: GoGhost
options:
  bundleIdPrefix: com.goghost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES

targets:
  GoGhost:
    type: application
    platform: iOS
    sources:
      - path: GoGhost
    resources:
      - path: GoGhost/Resources
    info:
      path: GoGhost/Info.plist
      properties:
        CFBundleDisplayName: GoGhost
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        NSUserNotificationUsageDescription: "GoGhost sends daily check-in reminders."
        UIAppFonts:
          - InterVariable.ttf
          - InterDisplay-Black.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goghost.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: GoGhost/Info.plist
    scheme:
      testTargets:
        - GoGhostTests
    dependencies: []

  GoGhostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GoGhostTests
    dependencies:
      - target: GoGhost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goghost.tests
